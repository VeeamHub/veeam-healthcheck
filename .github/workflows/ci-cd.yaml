name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "dev" ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  # Build and test - runs on every push/PR
  build-and-test:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Version is managed in VeeamHealthCheck.csproj and auto-incremented on every build
    # Version increments via increment_version script during build process

    - name: Restore dependencies
      run: dotnet restore vHC/HC.sln
      
    - name: Build solution
      run: dotnet build vHC/HC.sln --configuration Release --no-restore
      
    - name: Run tests with coverage
      run: |
        dotnet test vHC/HC.sln `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --logger "trx;LogFileName=test-results.trx" `
          --collect:"XPlat Code Coverage" `
          --results-directory ${{ github.workspace }}/TestResults

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/composite@v2
      if: always()
      with:
        files: '${{ github.workspace }}/TestResults/**/*.trx'
        check_name: 'Test Results'
        comment_mode: 'off'

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      if: always()
      run: |
        $coverageFiles = Get-ChildItem -Path "${{ github.workspace }}/TestResults" -Filter "coverage.cobertura.xml" -Recurse | Select-Object -ExpandProperty FullName
        if ($coverageFiles) {
          $reports = $coverageFiles -join ";"
          reportgenerator `
            -reports:"$reports" `
            -targetdir:"${{ github.workspace }}/CoverageReport" `
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"

          # Output summary to step summary
          $summaryPath = "${{ github.workspace }}/CoverageReport/SummaryGithub.md"
          if (Test-Path $summaryPath) {
            Get-Content $summaryPath >> $env:GITHUB_STEP_SUMMARY
          }
        } else {
          echo "No coverage files found"
        }

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: ${{ github.workspace }}/CoverageReport
        retention-days: 30
        if-no-files-found: warn
    
    - name: Get version from assembly
      id: get_version
      run: |
        $csproj = [xml](Get-Content vHC/HC_Reporting/VeeamHealthCheck.csproj)
        $baseVersion = $csproj.Project.PropertyGroup[0].AssemblyVersion

        # Parse base version (e.g., 3.0.0.501) and replace last segment with run number
        $versionParts = $baseVersion.Split('.')
        # Use format: Major.Minor.Patch.RunNumber (e.g., 3.0.1.45)
        $version = "$($versionParts[0]).$($versionParts[1]).1.${{ github.run_number }}"

        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Base version: $baseVersion"
        echo "Release version: $version (using run number ${{ github.run_number }})"
    
    - name: Publish single-file executable
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        dotnet publish vHC/HC_Reporting/VeeamHealthCheck.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:Version=$version `
          -p:AssemblyVersion=$version `
          -p:FileVersion=$version `
          -o publish/out
        Write-Host "Published with version: $version"
    
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path publish/out/* -DestinationPath publish/VeeamHealthCheck-${{ steps.get_version.outputs.version }}.zip
    
    - name: Upload ZIP artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: publish/VeeamHealthCheck-${{ steps.get_version.outputs.version }}.zip
        retention-days: 7

  # Integration test on self-hosted VBR
  integration-test-vbr:
    needs: build-and-test
    runs-on: [self-hosted, CONSOLE_HOST]
    if: github.event_name != 'pull_request'

    steps:
    - name: Pre-run cleanup
      run: |
        if (Test-Path "C:\temp\vHC") {
          Remove-Item -Path "C:\temp\vHC" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned stale data from C:\temp\vHC" -ForegroundColor Yellow
        }

    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: ${{ github.workspace }}/test-download
    
    - name: Extract ZIP
      run: |
        $zipFile = Get-ChildItem "${{ github.workspace }}\test-download\*.zip" | Select-Object -First 1
        $extractPath = "${{ github.workspace }}\test-run"
        
        Write-Host "Extracting: $($zipFile.FullName)" -ForegroundColor Cyan
        Expand-Archive -Path $zipFile.FullName -DestinationPath $extractPath -Force
        
        # Verify extraction
        $exePath = "$extractPath\VeeamHealthCheck.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ Extracted successfully" -ForegroundColor Green
          Write-Host "Contents:" -ForegroundColor Yellow
          Get-ChildItem $extractPath -Recurse | Select-Object FullName
        } else {
          Write-Host "❌ Extraction failed - EXE not found" -ForegroundColor Red
          exit 1
        }
    
    - name: Run VeeamHealthCheck on VBR
      id: run_healthcheck
      env:
        VBR_HOST: ${{ secrets.VBR_HOST }}
        VBR_USERNAME: ${{ secrets.VBR_USERNAME }}
        VBR_PASSWORD: ${{ secrets.VBR_13_REMOTE_PW }}
      run: |
        $exePath = "${{ github.workspace }}\test-run\VeeamHealthCheck.exe"
        
        Write-Host "Starting VeeamHealthCheck..." -ForegroundColor Cyan
        Write-Host "Target VBR: $env:VBR_HOST" -ForegroundColor Yellow
        Write-Host "Working directory: $(Split-Path $exePath)" -ForegroundColor Yellow
        
        $creds = "$env:VBR_USERNAME`:$env:VBR_PASSWORD"
        
        # Run from the extracted directory so it can find relative paths
        Push-Location (Split-Path $exePath)
        try {
          $process = Start-Process -FilePath $exePath `
            -ArgumentList "/run", "/remote", "/host=$env:VBR_HOST", "/creds=$creds" `
            -NoNewWindow -PassThru -Wait
          
          $exitCode = $process.ExitCode
          
          if ($exitCode -eq 0) {
            Write-Host "Health check completed successfully!" -ForegroundColor Green
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Health check failed with exit code: $exitCode" -ForegroundColor Red
            echo "success=false" >> $env:GITHUB_OUTPUT
            exit $exitCode
          }
        } finally {
          Pop-Location
        }
    
    - name: Scan VHC logs for errors
      # P2-1: extract to composite action
      if: always()
      run: |
        $logDir = "C:\temp\vHC\Original\Log"
        $logFiles = Get-ChildItem "$logDir\*.log" -ErrorAction SilentlyContinue

        if (-not $logFiles) {
          Write-Host "⚠️ No log files found in $logDir" -ForegroundColor Yellow
          exit 0
        }

        Write-Host "📋 Scanning $($logFiles.Count) log file(s) for errors..." -ForegroundColor Cyan

        $errorPatterns = @('ERROR', 'EXCEPTION', 'FATAL')
        $findings = @()

        foreach ($log in $logFiles) {
          $lineNum = 0
          foreach ($line in (Get-Content $log.FullName)) {
            $lineNum++
            foreach ($pattern in $errorPatterns) {
              if ($line -match $pattern) {
                $findings += [PSCustomObject]@{
                  File    = $log.Name
                  Line    = $lineNum
                  Pattern = $pattern
                  Text    = $line.Trim().Substring(0, [Math]::Min($line.Trim().Length, 200))
                }
                break  # one match per line is enough
              }
            }
          }
        }

        if ($findings.Count -eq 0) {
          Write-Host "✅ No ERROR/EXCEPTION/FATAL entries found in logs" -ForegroundColor Green
        } else {
          Write-Host "❌ Found $($findings.Count) error entries in VHC logs:" -ForegroundColor Red
          $findings | ForEach-Object {
            Write-Host "  [$($_.Pattern)] $($_.File):$($_.Line) — $($_.Text)" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "VHC exited 0 but logged errors — this indicates partial data collection failure." -ForegroundColor Red
          exit 1
        }

    - name: Find generated report
      id: find_report
      if: always()
      run: |
        $reportDir = "C:\temp\vHC\vHC-Report"
        if (Test-Path $reportDir) {
          $latestReport = Get-ChildItem -Path $reportDir -Filter "*.html" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 1
          
          if ($latestReport) {
            echo "report_path=$($latestReport.FullName)" >> $env:GITHUB_OUTPUT
            echo "report_name=$($latestReport.Name)" >> $env:GITHUB_OUTPUT
          }
        }
    
    - name: Upload health check report
      if: always() && steps.find_report.outputs.report_path
      uses: actions/upload-artifact@v4
      with:
        name: health-check-report-${{ github.run_number }}-v13-remote
        path: ${{ steps.find_report.outputs.report_path }}
        retention-days: 30

    - name: Validate session report generation
      if: always()
      run: |
        # Session reporting now runs inside Get-VBRConfig.ps1 via Get-VhcBackupSessions /
        # Get-VhcSessionReport module functions. SessionCache.xml no longer exists.
        $logDir = "C:\temp\vHC\Original\Log"
        $logFile = Get-ChildItem $logDir -Filter "*.log" -ErrorAction SilentlyContinue |
                   Where-Object Name -notmatch "VeeamSessionReport" |
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($logFile) {
          $logContent = Get-Content $logFile.FullName -Raw -ErrorAction SilentlyContinue
          if ($logContent -match "Fetched (\d+) backup sessions") {
            Write-Host "✅ Backup sessions fetched: $($Matches[1])" -ForegroundColor Green
          }
          if ($logContent -match "Exported (\d+) session rows") {
            Write-Host "✅ Session report exported: $($Matches[1]) rows" -ForegroundColor Green
          } elseif ($logContent -match "No session rows produced") {
            Write-Host "⚠️ Session report produced no rows" -ForegroundColor Yellow
          }
        } else {
          Write-Host "⚠️ Collection log not found at $logDir" -ForegroundColor Yellow
        }

    - name: Validate CSV collection outputs
      id: csv_validation
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "📁 CSV Directory: $($csvDir.FullName)" -ForegroundColor Cyan

          # CRITICAL files - job FAILS if any are missing (indicates PS script failure)
          # Files are prefixed with hostname: e.g., localhost_Jobs.csv, servername_Servers.csv
          $criticalPatterns = @('*_Servers.csv', '*_Proxies.csv', '*_Repositories.csv', '*_Jobs.csv', '*_vbrinfo.csv')

          # Optional files - warning only
          $optionalPatterns = @('*_UserRoles.csv', '*_SOBRs.csv', '*_LicInfo.csv', 'VeeamSessionReport.csv')

          $foundCount = 0
          $criticalMissing = @()
          $optionalMissing = @()

          foreach ($pattern in $criticalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [CRITICAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ❌ [CRITICAL] $pattern - MISSING" -ForegroundColor Red
              $criticalMissing += $pattern
            }
          }

          foreach ($pattern in $optionalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [OPTIONAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ⚠️ [OPTIONAL] $pattern - missing" -ForegroundColor Yellow
              $optionalMissing += $pattern
            }
          }

          Write-Host ""
          Write-Host "📊 CSV Summary: $foundCount found" -ForegroundColor Cyan

          if ($criticalMissing.Count -gt 0) {
            Write-Host "❌ CRITICAL FILES MISSING: $($criticalMissing -join ', ')" -ForegroundColor Red
            Write-Host "This indicates the PowerShell collection script failed." -ForegroundColor Red
            Write-Host "Check the logs above for 'PowerShell Errors' or 'Script failed with exit code'" -ForegroundColor Yellow
            exit 1
          }
        } else {
          Write-Host "❌ CSV output directory not found - collection likely failed completely" -ForegroundColor Red
          exit 1
        }

    - name: Validate CSV content quality
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "🔍 Validating CSV Content Quality..." -ForegroundColor Cyan

          # Validate _vbrinfo.csv version format
          $vbrinfoPath = Join-Path $csvDir.FullName "_vbrinfo.csv"
          if (Test-Path $vbrinfoPath) {
            $vbrinfo = Import-Csv $vbrinfoPath
            if ($vbrinfo.Version -match '^\d{1,2}\.\d{1,2}\.\d{1,2}\.\d{3,4}$') {
              Write-Host "  ✅ VBR version format valid: $($vbrinfo.Version)" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ VBR version format unexpected: $($vbrinfo.Version)" -ForegroundColor Yellow
            }
          }

          # Validate Repositories.csv data integrity
          $reposPath = Join-Path $csvDir.FullName "_Repositories.csv"
          if (Test-Path $reposPath) {
            $repos = Import-Csv $reposPath
            $invalidRepos = $repos | Where-Object {
              [long]$_.FreeSpace -gt [long]$_.TotalSpace
            }
            if ($invalidRepos.Count -eq 0) {
              Write-Host "  ✅ All repositories have valid FreeSpace <= TotalSpace" -ForegroundColor Green
            } else {
              Write-Host "  ❌ Found $($invalidRepos.Count) repositories with FreeSpace > TotalSpace" -ForegroundColor Red
              $invalidRepos | ForEach-Object { Write-Host "    - $($_.Name): Free=$($_.FreeSpace) > Total=$($_.TotalSpace)" }
              exit 1
            }
          }

          # Validate Proxies reference valid Servers
          $serversPath = Join-Path $csvDir.FullName "_Servers.csv"
          $proxiesPath = Join-Path $csvDir.FullName "_Proxies.csv"
          if ((Test-Path $serversPath) -and (Test-Path $proxiesPath)) {
            $servers = Import-Csv $serversPath
            $proxies = Import-Csv $proxiesPath
            $serverNames = $servers.Name

            $orphanProxies = $proxies | Where-Object {
              $serverNames -notcontains $_.Host
            }

            if ($orphanProxies.Count -eq 0) {
              Write-Host "  ✅ All proxy hosts have corresponding server entries" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ Found $($orphanProxies.Count) proxies with missing server entries" -ForegroundColor Yellow
              $orphanProxies | ForEach-Object { Write-Host "    - Proxy '$($_.Name)' references unknown host '$($_.Host)'" }
            }
          }

          Write-Host "✅ CSV content validation complete" -ForegroundColor Green
        }

    - name: Validate CSV column schemas
      # P2-1: extract to composite action
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if (-not $csvDir) {
          Write-Host "⚠️ CSV directory not found, skipping schema validation" -ForegroundColor Yellow
          exit 0
        }

        $expectedSchemas = @{
          '*_vbrinfo.csv'       = @('Name', 'Version', 'SqlServer')
          '*_Servers.csv'       = @('Name', 'Type')
          '*_Proxies.csv'       = @('Name', 'Host')
          '*_Repositories.csv'  = @('Name', 'Path')
          '*_Jobs.csv'          = @('Name', 'Type')
        }

        $failures = @()

        foreach ($pattern in $expectedSchemas.Keys) {
          $file = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue |
                  Select-Object -First 1

          if (-not $file) {
            Write-Host "  ⚠️ $pattern not found — skipping schema check (existence validated elsewhere)" -ForegroundColor Yellow
            continue
          }

          # Read just the header row
          $headerLine = Get-Content $file.FullName -TotalCount 1
          if (-not $headerLine) {
            Write-Host "  ❌ $($file.Name) is empty — no header row" -ForegroundColor Red
            $failures += $file.Name
            continue
          }

          $actualColumns = ($headerLine -split ',') | ForEach-Object { $_.Trim('"', ' ') }
          $expectedColumns = $expectedSchemas[$pattern]
          $missingColumns = @()

          foreach ($col in $expectedColumns) {
            if ($actualColumns -notcontains $col) {
              $missingColumns += $col
            }
          }

          if ($missingColumns.Count -eq 0) {
            Write-Host "  ✅ $($file.Name) — all expected columns present: $($expectedColumns -join ', ')" -ForegroundColor Green
          } else {
            Write-Host "  ❌ $($file.Name) — missing columns: $($missingColumns -join ', ')" -ForegroundColor Red
            Write-Host "       Expected: $($expectedColumns -join ', ')" -ForegroundColor Yellow
            Write-Host "       Actual:   $($actualColumns -join ', ')" -ForegroundColor Yellow
            $failures += "$($file.Name) (missing: $($missingColumns -join ', '))"
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ CSV schema validation failed for $($failures.Count) file(s):" -ForegroundColor Red
          $failures | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
          Write-Host "Column renames in PS scripts break the C# CSV parser silently." -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ CSV column schema validation complete" -ForegroundColor Green

    - name: Validate HTML report content
      if: always()
      run: |
        $reportPath = "${{ steps.find_report.outputs.report_path }}"

        if ($reportPath -and (Test-Path $reportPath)) {
          Write-Host "🔍 Validating HTML Report Content..." -ForegroundColor Cyan

          $reportContent = Get-Content $reportPath -Raw

          # Core required sections (fail if missing)
          $coreRequiredSections = @(
            'License Information',
            'Backup Server'
          )

          # Optional sections (warn if missing, but don't fail)
          $optionalSections = @(
            'Security Summary',
            'Proxy Configuration',
            'Repository Configuration',
            'Job Summary'
          )

          # Check core required sections
          $missingCore = @()
          foreach ($section in $coreRequiredSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingCore += $section
            }
          }

          if ($missingCore.Count -eq 0) {
            Write-Host "  ✅ All core sections present" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Missing core required sections:" -ForegroundColor Red
            $missingCore | ForEach-Object { Write-Host "    - $_" }
            exit 1
          }

          # Check optional sections (informational only)
          $missingOptional = @()
          foreach ($section in $optionalSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingOptional += $section
            }
          }

          if ($missingOptional.Count -gt 0) {
            Write-Host "  ⚠️ Optional sections not found (may not be configured):" -ForegroundColor Yellow
            $missingOptional | ForEach-Object { Write-Host "    - $_" }
          } else {
            Write-Host "  ✅ All optional sections present" -ForegroundColor Green
          }

          # Validate navigation links
          $hrefMatches = [regex]::Matches($reportContent, 'href=[''"]#(\w+)[''"]')
          $idMatches = [regex]::Matches($reportContent, 'id=[''"](\w+)[''"]')

          $hrefs = $hrefMatches | ForEach-Object { $_.Groups[1].Value }
          $ids = $idMatches | ForEach-Object { $_.Groups[1].Value }

          $deadLinks = $hrefs | Where-Object { $ids -notcontains $_ }

          if ($deadLinks.Count -eq 0) {
            Write-Host "  ✅ All navigation links are valid" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($deadLinks.Count) dead navigation links" -ForegroundColor Red
            $deadLinks | ForEach-Object { Write-Host "    - #$_" }
            Write-Host "Report navigation is broken — this is a release-blocking defect." -ForegroundColor Red
            exit 1
          }

          # Validate percentages are in valid range
          $percentageMatches = [regex]::Matches($reportContent, '(\d+\.?\d*)\s*%')
          $invalidPercentages = @()

          foreach ($match in $percentageMatches) {
            $value = [decimal]$match.Groups[1].Value
            if ($value -lt 0 -or $value -gt 100) {
              $invalidPercentages += $value
            }
          }

          if ($invalidPercentages.Count -eq 0) {
            Write-Host "  ✅ All percentages are within valid range (0-100%)" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($invalidPercentages.Count) percentages out of range" -ForegroundColor Red
            $invalidPercentages | ForEach-Object { Write-Host "    - $_%" }
            exit 1
          }

          Write-Host "✅ HTML report content validation complete" -ForegroundColor Green
        } else {
          Write-Host "⚠️ Report file not found, skipping HTML validation" -ForegroundColor Yellow
        }

    - name: Validate HTML table data rows
      # P2-1: extract to composite action
      if: always()
      run: |
        $reportFile = "${{ steps.find_report.outputs.report_path }}"
        if (-not $reportFile -or -not (Test-Path $reportFile)) {
          Write-Host "⚠️ Report file not found, skipping table validation" -ForegroundColor Yellow
          exit 0
        }

        $content = Get-Content $reportFile -Raw

        # Tables that MUST have at least one data row (1 <tr> header + 1+ <tr> data)
        # Key: regex to locate the table section; Value: human-readable name
        $requiredTables = @{
          'License Information'  = 'License Information'
          'Backup Server'        = 'Backup Server'
        }

        # Tables that SHOULD have data rows (warn only)
        $warnTables = @{
          'Proxy Configuration'     = 'Proxy Configuration'
          'Repository Configuration' = 'Repository Configuration'
          'Job Summary'              = 'Job Summary'
        }

        $failures = @()
        $warnings = @()

        function Test-TableHasDataRows {
          param([string]$Content, [string]$SectionName)
          # Find the section, then the next <table>...</table> block
          $sectionIdx = $Content.IndexOf($SectionName)
          if ($sectionIdx -lt 0) { return $null }  # section not found

          $tableStart = $Content.IndexOf('<table', $sectionIdx)
          if ($tableStart -lt 0) { return $null }

          $tableEnd = $Content.IndexOf('</table>', $tableStart)
          if ($tableEnd -lt 0) { return $null }

          $tableHtml = $Content.Substring($tableStart, $tableEnd - $tableStart + 8)
          $rowCount = ([regex]::Matches($tableHtml, '<tr[\s>]')).Count

          return $rowCount  # 1 = header only, 2+ = has data
        }

        foreach ($key in $requiredTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($requiredTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ❌ [$($requiredTables[$key])] Table has $rows row(s) — no data rows" -ForegroundColor Red
            $failures += $requiredTables[$key]
          } else {
            Write-Host "  ✅ [$($requiredTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        foreach ($key in $warnTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Table has $rows row(s) — empty" -ForegroundColor Yellow
            $warnings += $warnTables[$key]
          } else {
            Write-Host "  ✅ [$($warnTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ $($failures.Count) required table(s) have no data: $($failures -join ', ')" -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ HTML table row validation complete" -ForegroundColor Green

    - name: Collect performance metrics
      if: always()
      run: |
        $logFiles = Get-ChildItem "C:\temp\vHC\Original\Log\*.log" -ErrorAction SilentlyContinue

        Write-Host "⏱️ Performance Metrics:" -ForegroundColor Cyan
        foreach ($log in $logFiles) {
          $content = Get-Content $log.FullName
          $startLine = $content | Where-Object { $_ -match "Starting|Enter" } | Select-Object -First 1
          $endLine = $content | Where-Object { $_ -match "complete|DONE" } | Select-Object -Last 1

          if ($startLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $startTs = $Matches[1]
            if ($endLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $endTs = $Matches[1]
            try {
              $start = [datetime]::ParseExact($startTs, "yyyy-MM-dd HH:mm:ss", $null)
              $end = [datetime]::ParseExact($endTs, "yyyy-MM-dd HH:mm:ss", $null)
              $duration = ($end - $start).TotalMinutes
              Write-Host "  📄 $($log.BaseName): $([math]::Round($duration, 2)) minutes" -ForegroundColor White
            } catch {
              Write-Host "  ⚠️ $($log.BaseName): Could not parse timing" -ForegroundColor Yellow
            }
            }
          }
        }

    - name: Upload health check logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: health-check-logs-${{ github.run_number }}-v13-remote
        path: C:\temp\vHC\Original\Log\*.log
        if-no-files-found: warn
        retention-days: 7
    
    - name: Cleanup
      if: always()
      continue-on-error: true
      run: |
        # Add delay to allow file handles to release
        Start-Sleep -Seconds 2
        if (Test-Path "${{ github.workspace }}\test-run") {
          Remove-Item -Path "${{ github.workspace }}\test-run" -Recurse -Force -ErrorAction SilentlyContinue
        }
        if (Test-Path "${{ github.workspace }}\test-download") {
          Remove-Item -Path "${{ github.workspace }}\test-download" -Recurse -Force -ErrorAction SilentlyContinue
        }
        # if (Test-Path "C:\temp\vHC") {
        #   Remove-Item -Path "C:\temp\vHC" -Recurse -Force
        # }
  integration-test-vbr-13-sql:
    needs: build-and-test
    runs-on: [self-hosted, vbr-13-sql]
    if: github.event_name != 'pull_request'

    steps:
    - name: Pre-run cleanup
      run: |
        if (Test-Path "C:\temp\vHC") {
          Remove-Item -Path "C:\temp\vHC" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned stale data from C:\temp\vHC" -ForegroundColor Yellow
        }

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: ${{ github.workspace }}/test-download
    
    - name: Extract ZIP
      run: |
        $zipFile = Get-ChildItem "${{ github.workspace }}\test-download\*.zip" | Select-Object -First 1
        $extractPath = "${{ github.workspace }}\test-run"
        
        Write-Host "Extracting: $($zipFile.FullName)" -ForegroundColor Cyan
        Expand-Archive -Path $zipFile.FullName -DestinationPath $extractPath -Force
        
        # Verify extraction
        $exePath = "$extractPath\VeeamHealthCheck.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ Extracted successfully" -ForegroundColor Green
          Write-Host "Contents:" -ForegroundColor Yellow
          Get-ChildItem $extractPath -Recurse | Select-Object FullName
        } else {
          Write-Host "❌ Extraction failed - EXE not found" -ForegroundColor Red
          exit 1
        }
    
    - name: Run VeeamHealthCheck on VBR
      id: run_healthcheck
      env:
        VBR_HOST: ${{ secrets.VBR_HOST }}
        VBR_USERNAME: ${{ secrets.VBR_WIN_USER }}
        VBR_PASSWORD: ${{ secrets.VBR_WIN_PWD }}
      run: |
        $exePath = "${{ github.workspace }}\test-run\VeeamHealthCheck.exe"
        
        Write-Host "Starting VeeamHealthCheck..." -ForegroundColor Cyan
        Write-Host "Target VBR: $env:VBR_HOST" -ForegroundColor Yellow
        Write-Host "Working directory: $(Split-Path $exePath)" -ForegroundColor Yellow
        
        $creds = "$env:VBR_USERNAME`:$env:VBR_PASSWORD"
        
        # Run from the extracted directory so it can find relative paths
        Push-Location (Split-Path $exePath)
        try {
          $process = Start-Process -FilePath $exePath `
            -ArgumentList "/run", "/creds=$creds" `
            -NoNewWindow -PassThru -Wait
          
          $exitCode = $process.ExitCode
          
          if ($exitCode -eq 0) {
            Write-Host "Health check completed successfully!" -ForegroundColor Green
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Health check failed with exit code: $exitCode" -ForegroundColor Red
            echo "success=false" >> $env:GITHUB_OUTPUT
            exit $exitCode
          }
        } finally {
          Pop-Location
        }
    
    - name: Scan VHC logs for errors
      # P2-1: extract to composite action
      if: always()
      run: |
        $logDir = "C:\temp\vHC\Original\Log"
        $logFiles = Get-ChildItem "$logDir\*.log" -ErrorAction SilentlyContinue

        if (-not $logFiles) {
          Write-Host "⚠️ No log files found in $logDir" -ForegroundColor Yellow
          exit 0
        }

        Write-Host "📋 Scanning $($logFiles.Count) log file(s) for errors..." -ForegroundColor Cyan

        $errorPatterns = @('ERROR', 'EXCEPTION', 'FATAL')
        $findings = @()

        foreach ($log in $logFiles) {
          $lineNum = 0
          foreach ($line in (Get-Content $log.FullName)) {
            $lineNum++
            foreach ($pattern in $errorPatterns) {
              if ($line -match $pattern) {
                $findings += [PSCustomObject]@{
                  File    = $log.Name
                  Line    = $lineNum
                  Pattern = $pattern
                  Text    = $line.Trim().Substring(0, [Math]::Min($line.Trim().Length, 200))
                }
                break  # one match per line is enough
              }
            }
          }
        }

        if ($findings.Count -eq 0) {
          Write-Host "✅ No ERROR/EXCEPTION/FATAL entries found in logs" -ForegroundColor Green
        } else {
          Write-Host "❌ Found $($findings.Count) error entries in VHC logs:" -ForegroundColor Red
          $findings | ForEach-Object {
            Write-Host "  [$($_.Pattern)] $($_.File):$($_.Line) — $($_.Text)" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "VHC exited 0 but logged errors — this indicates partial data collection failure." -ForegroundColor Red
          exit 1
        }

    - name: Find generated report
      id: find_report
      if: always()
      run: |
        $reportDir = "C:\temp\vHC\vHC-Report"
        if (Test-Path $reportDir) {
          $latestReport = Get-ChildItem -Path $reportDir -Filter "*.html" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 1
          
          if ($latestReport) {
            echo "report_path=$($latestReport.FullName)" >> $env:GITHUB_OUTPUT
            echo "report_name=$($latestReport.Name)" >> $env:GITHUB_OUTPUT
          }
        }
    
    - name: Upload health check report
      if: always() && steps.find_report.outputs.report_path
      uses: actions/upload-artifact@v4
      with:
        name: health-check-report-${{ github.run_number }}-v13-sql
        path: ${{ steps.find_report.outputs.report_path }}
        retention-days: 30

    - name: Validate session report generation
      if: always()
      run: |
        # Session reporting now runs inside Get-VBRConfig.ps1 via Get-VhcBackupSessions /
        # Get-VhcSessionReport module functions. SessionCache.xml no longer exists.
        $logDir = "C:\temp\vHC\Original\Log"
        $logFile = Get-ChildItem $logDir -Filter "*.log" -ErrorAction SilentlyContinue |
                   Where-Object Name -notmatch "VeeamSessionReport" |
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($logFile) {
          $logContent = Get-Content $logFile.FullName -Raw -ErrorAction SilentlyContinue
          if ($logContent -match "Fetched (\d+) backup sessions") {
            Write-Host "✅ Backup sessions fetched: $($Matches[1])" -ForegroundColor Green
          }
          if ($logContent -match "Exported (\d+) session rows") {
            Write-Host "✅ Session report exported: $($Matches[1]) rows" -ForegroundColor Green
          } elseif ($logContent -match "No session rows produced") {
            Write-Host "⚠️ Session report produced no rows" -ForegroundColor Yellow
          }
        } else {
          Write-Host "⚠️ Collection log not found at $logDir" -ForegroundColor Yellow
        }

    - name: Validate CSV collection outputs
      id: csv_validation
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "📁 CSV Directory: $($csvDir.FullName)" -ForegroundColor Cyan

          # CRITICAL files - job FAILS if any are missing (indicates PS script failure)
          # Files are prefixed with hostname: e.g., localhost_Jobs.csv, servername_Servers.csv
          $criticalPatterns = @('*_Servers.csv', '*_Proxies.csv', '*_Repositories.csv', '*_Jobs.csv', '*_vbrinfo.csv')

          # Optional files - warning only
          $optionalPatterns = @('*_UserRoles.csv', '*_SOBRs.csv', '*_LicInfo.csv', 'VeeamSessionReport.csv')

          $foundCount = 0
          $criticalMissing = @()
          $optionalMissing = @()

          foreach ($pattern in $criticalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [CRITICAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ❌ [CRITICAL] $pattern - MISSING" -ForegroundColor Red
              $criticalMissing += $pattern
            }
          }

          foreach ($pattern in $optionalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [OPTIONAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ⚠️ [OPTIONAL] $pattern - missing" -ForegroundColor Yellow
              $optionalMissing += $pattern
            }
          }

          Write-Host ""
          Write-Host "📊 CSV Summary: $foundCount found" -ForegroundColor Cyan

          if ($criticalMissing.Count -gt 0) {
            Write-Host "❌ CRITICAL FILES MISSING: $($criticalMissing -join ', ')" -ForegroundColor Red
            Write-Host "This indicates the PowerShell collection script failed." -ForegroundColor Red
            Write-Host "Check the logs above for 'PowerShell Errors' or 'Script failed with exit code'" -ForegroundColor Yellow
            exit 1
          }
        } else {
          Write-Host "❌ CSV output directory not found - collection likely failed completely" -ForegroundColor Red
          exit 1
        }

    - name: Validate CSV content quality
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "🔍 Validating CSV Content Quality..." -ForegroundColor Cyan

          # Validate _vbrinfo.csv version format
          $vbrinfoPath = Join-Path $csvDir.FullName "_vbrinfo.csv"
          if (Test-Path $vbrinfoPath) {
            $vbrinfo = Import-Csv $vbrinfoPath
            if ($vbrinfo.Version -match '^\d{1,2}\.\d{1,2}\.\d{1,2}\.\d{3,4}$') {
              Write-Host "  ✅ VBR version format valid: $($vbrinfo.Version)" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ VBR version format unexpected: $($vbrinfo.Version)" -ForegroundColor Yellow
            }
          }

          # Validate Repositories.csv data integrity
          $reposPath = Join-Path $csvDir.FullName "_Repositories.csv"
          if (Test-Path $reposPath) {
            $repos = Import-Csv $reposPath
            $invalidRepos = $repos | Where-Object {
              [long]$_.FreeSpace -gt [long]$_.TotalSpace
            }
            if ($invalidRepos.Count -eq 0) {
              Write-Host "  ✅ All repositories have valid FreeSpace <= TotalSpace" -ForegroundColor Green
            } else {
              Write-Host "  ❌ Found $($invalidRepos.Count) repositories with FreeSpace > TotalSpace" -ForegroundColor Red
              $invalidRepos | ForEach-Object { Write-Host "    - $($_.Name): Free=$($_.FreeSpace) > Total=$($_.TotalSpace)" }
              exit 1
            }
          }

          # Validate Proxies reference valid Servers
          $serversPath = Join-Path $csvDir.FullName "_Servers.csv"
          $proxiesPath = Join-Path $csvDir.FullName "_Proxies.csv"
          if ((Test-Path $serversPath) -and (Test-Path $proxiesPath)) {
            $servers = Import-Csv $serversPath
            $proxies = Import-Csv $proxiesPath
            $serverNames = $servers.Name

            $orphanProxies = $proxies | Where-Object {
              $serverNames -notcontains $_.Host
            }

            if ($orphanProxies.Count -eq 0) {
              Write-Host "  ✅ All proxy hosts have corresponding server entries" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ Found $($orphanProxies.Count) proxies with missing server entries" -ForegroundColor Yellow
              $orphanProxies | ForEach-Object { Write-Host "    - Proxy '$($_.Name)' references unknown host '$($_.Host)'" }
            }
          }

          Write-Host "✅ CSV content validation complete" -ForegroundColor Green
        }

    - name: Validate CSV column schemas
      # P2-1: extract to composite action
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if (-not $csvDir) {
          Write-Host "⚠️ CSV directory not found, skipping schema validation" -ForegroundColor Yellow
          exit 0
        }

        $expectedSchemas = @{
          '*_vbrinfo.csv'       = @('Name', 'Version', 'SqlServer')
          '*_Servers.csv'       = @('Name', 'Type')
          '*_Proxies.csv'       = @('Name', 'Host')
          '*_Repositories.csv'  = @('Name', 'Path')
          '*_Jobs.csv'          = @('Name', 'Type')
        }

        $failures = @()

        foreach ($pattern in $expectedSchemas.Keys) {
          $file = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue |
                  Select-Object -First 1

          if (-not $file) {
            Write-Host "  ⚠️ $pattern not found — skipping schema check (existence validated elsewhere)" -ForegroundColor Yellow
            continue
          }

          # Read just the header row
          $headerLine = Get-Content $file.FullName -TotalCount 1
          if (-not $headerLine) {
            Write-Host "  ❌ $($file.Name) is empty — no header row" -ForegroundColor Red
            $failures += $file.Name
            continue
          }

          $actualColumns = ($headerLine -split ',') | ForEach-Object { $_.Trim('"', ' ') }
          $expectedColumns = $expectedSchemas[$pattern]
          $missingColumns = @()

          foreach ($col in $expectedColumns) {
            if ($actualColumns -notcontains $col) {
              $missingColumns += $col
            }
          }

          if ($missingColumns.Count -eq 0) {
            Write-Host "  ✅ $($file.Name) — all expected columns present: $($expectedColumns -join ', ')" -ForegroundColor Green
          } else {
            Write-Host "  ❌ $($file.Name) — missing columns: $($missingColumns -join ', ')" -ForegroundColor Red
            Write-Host "       Expected: $($expectedColumns -join ', ')" -ForegroundColor Yellow
            Write-Host "       Actual:   $($actualColumns -join ', ')" -ForegroundColor Yellow
            $failures += "$($file.Name) (missing: $($missingColumns -join ', '))"
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ CSV schema validation failed for $($failures.Count) file(s):" -ForegroundColor Red
          $failures | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
          Write-Host "Column renames in PS scripts break the C# CSV parser silently." -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ CSV column schema validation complete" -ForegroundColor Green

    - name: Validate HTML report content
      if: always()
      run: |
        $reportPath = "${{ steps.find_report.outputs.report_path }}"

        if ($reportPath -and (Test-Path $reportPath)) {
          Write-Host "🔍 Validating HTML Report Content..." -ForegroundColor Cyan

          $reportContent = Get-Content $reportPath -Raw

          # Core required sections (fail if missing)
          $coreRequiredSections = @(
            'License Information',
            'Backup Server'
          )

          # Optional sections (warn if missing, but don't fail)
          $optionalSections = @(
            'Security Summary',
            'Proxy Configuration',
            'Repository Configuration',
            'Job Summary'
          )

          # Check core required sections
          $missingCore = @()
          foreach ($section in $coreRequiredSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingCore += $section
            }
          }

          if ($missingCore.Count -eq 0) {
            Write-Host "  ✅ All core sections present" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Missing core required sections:" -ForegroundColor Red
            $missingCore | ForEach-Object { Write-Host "    - $_" }
            exit 1
          }

          # Check optional sections (informational only)
          $missingOptional = @()
          foreach ($section in $optionalSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingOptional += $section
            }
          }

          if ($missingOptional.Count -gt 0) {
            Write-Host "  ⚠️ Optional sections not found (may not be configured):" -ForegroundColor Yellow
            $missingOptional | ForEach-Object { Write-Host "    - $_" }
          } else {
            Write-Host "  ✅ All optional sections present" -ForegroundColor Green
          }

          # Validate navigation links
          $hrefMatches = [regex]::Matches($reportContent, 'href=[''"]#(\w+)[''"]')
          $idMatches = [regex]::Matches($reportContent, 'id=[''"](\w+)[''"]')

          $hrefs = $hrefMatches | ForEach-Object { $_.Groups[1].Value }
          $ids = $idMatches | ForEach-Object { $_.Groups[1].Value }

          $deadLinks = $hrefs | Where-Object { $ids -notcontains $_ }

          if ($deadLinks.Count -eq 0) {
            Write-Host "  ✅ All navigation links are valid" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($deadLinks.Count) dead navigation links" -ForegroundColor Red
            $deadLinks | ForEach-Object { Write-Host "    - #$_" }
            Write-Host "Report navigation is broken — this is a release-blocking defect." -ForegroundColor Red
            exit 1
          }

          # Validate percentages are in valid range
          $percentageMatches = [regex]::Matches($reportContent, '(\d+\.?\d*)\s*%')
          $invalidPercentages = @()

          foreach ($match in $percentageMatches) {
            $value = [decimal]$match.Groups[1].Value
            if ($value -lt 0 -or $value -gt 100) {
              $invalidPercentages += $value
            }
          }

          if ($invalidPercentages.Count -eq 0) {
            Write-Host "  ✅ All percentages are within valid range (0-100%)" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($invalidPercentages.Count) percentages out of range" -ForegroundColor Red
            $invalidPercentages | ForEach-Object { Write-Host "    - $_%" }
            exit 1
          }

          Write-Host "✅ HTML report content validation complete" -ForegroundColor Green
        } else {
          Write-Host "⚠️ Report file not found, skipping HTML validation" -ForegroundColor Yellow
        }

    - name: Validate HTML table data rows
      # P2-1: extract to composite action
      if: always()
      run: |
        $reportFile = "${{ steps.find_report.outputs.report_path }}"
        if (-not $reportFile -or -not (Test-Path $reportFile)) {
          Write-Host "⚠️ Report file not found, skipping table validation" -ForegroundColor Yellow
          exit 0
        }

        $content = Get-Content $reportFile -Raw

        # Tables that MUST have at least one data row (1 <tr> header + 1+ <tr> data)
        # Key: regex to locate the table section; Value: human-readable name
        $requiredTables = @{
          'License Information'  = 'License Information'
          'Backup Server'        = 'Backup Server'
        }

        # Tables that SHOULD have data rows (warn only)
        $warnTables = @{
          'Proxy Configuration'     = 'Proxy Configuration'
          'Repository Configuration' = 'Repository Configuration'
          'Job Summary'              = 'Job Summary'
        }

        $failures = @()
        $warnings = @()

        function Test-TableHasDataRows {
          param([string]$Content, [string]$SectionName)
          # Find the section, then the next <table>...</table> block
          $sectionIdx = $Content.IndexOf($SectionName)
          if ($sectionIdx -lt 0) { return $null }  # section not found

          $tableStart = $Content.IndexOf('<table', $sectionIdx)
          if ($tableStart -lt 0) { return $null }

          $tableEnd = $Content.IndexOf('</table>', $tableStart)
          if ($tableEnd -lt 0) { return $null }

          $tableHtml = $Content.Substring($tableStart, $tableEnd - $tableStart + 8)
          $rowCount = ([regex]::Matches($tableHtml, '<tr[\s>]')).Count

          return $rowCount  # 1 = header only, 2+ = has data
        }

        foreach ($key in $requiredTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($requiredTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ❌ [$($requiredTables[$key])] Table has $rows row(s) — no data rows" -ForegroundColor Red
            $failures += $requiredTables[$key]
          } else {
            Write-Host "  ✅ [$($requiredTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        foreach ($key in $warnTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Table has $rows row(s) — empty" -ForegroundColor Yellow
            $warnings += $warnTables[$key]
          } else {
            Write-Host "  ✅ [$($warnTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ $($failures.Count) required table(s) have no data: $($failures -join ', ')" -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ HTML table row validation complete" -ForegroundColor Green

    - name: Collect performance metrics
      if: always()
      run: |
        $logFiles = Get-ChildItem "C:\temp\vHC\Original\Log\*.log" -ErrorAction SilentlyContinue

        Write-Host "⏱️ Performance Metrics:" -ForegroundColor Cyan
        foreach ($log in $logFiles) {
          $content = Get-Content $log.FullName
          $startLine = $content | Where-Object { $_ -match "Starting|Enter" } | Select-Object -First 1
          $endLine = $content | Where-Object { $_ -match "complete|DONE" } | Select-Object -Last 1

          if ($startLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $startTs = $Matches[1]
            if ($endLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $endTs = $Matches[1]
            try {
              $start = [datetime]::ParseExact($startTs, "yyyy-MM-dd HH:mm:ss", $null)
              $end = [datetime]::ParseExact($endTs, "yyyy-MM-dd HH:mm:ss", $null)
              $duration = ($end - $start).TotalMinutes
              Write-Host "  📄 $($log.BaseName): $([math]::Round($duration, 2)) minutes" -ForegroundColor White
            } catch {
              Write-Host "  ⚠️ $($log.BaseName): Could not parse timing" -ForegroundColor Yellow
            }
            }
          }
        }

    - name: Upload health check logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: health-check-logs-${{ github.run_number }}-v13-sql
        path: C:\temp\vHC\Original\Log\*.log
        if-no-files-found: warn
        retention-days: 7

    - name: Cleanup
      if: always()
      continue-on-error: true
      run: |
        # Add delay to allow file handles to release
        Start-Sleep -Seconds 2
        if (Test-Path "${{ github.workspace }}\test-run") {
          Remove-Item -Path "${{ github.workspace }}\test-run" -Recurse -Force -ErrorAction SilentlyContinue
        }
        if (Test-Path "${{ github.workspace }}\test-download") {
          Remove-Item -Path "${{ github.workspace }}\test-download" -Recurse -Force -ErrorAction SilentlyContinue
        }
        # if (Test-Path "C:\temp\vHC") {
        #   Remove-Item -Path "C:\temp\vHC" -Recurse -Force
        # }
  integration-test-vbr-12:
    needs: build-and-test
    runs-on: [self-hosted, vbr-v12]
    if: github.event_name != 'pull_request'

    steps:
    - name: Pre-run cleanup
      run: |
        if (Test-Path "C:\temp\vHC") {
          Remove-Item -Path "C:\temp\vHC" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned stale data from C:\temp\vHC" -ForegroundColor Yellow
        }

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: ${{ github.workspace }}/test-download
    
    - name: Extract ZIP
      run: |
        $zipFile = Get-ChildItem "${{ github.workspace }}\test-download\*.zip" | Select-Object -First 1
        $extractPath = "${{ github.workspace }}\test-run"
        
        Write-Host "Extracting: $($zipFile.FullName)" -ForegroundColor Cyan
        Expand-Archive -Path $zipFile.FullName -DestinationPath $extractPath -Force
        
        # Verify extraction
        $exePath = "$extractPath\VeeamHealthCheck.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ Extracted successfully" -ForegroundColor Green
          Write-Host "Contents:" -ForegroundColor Yellow
          Get-ChildItem $extractPath -Recurse | Select-Object FullName
        } else {
          Write-Host "❌ Extraction failed - EXE not found" -ForegroundColor Red
          exit 1
        }
    
    - name: Run VeeamHealthCheck on VBR
      id: run_healthcheck
      env:
        VBR_HOST: ${{ secrets.VBR_HOST }}
        VBR_USERNAME: ${{ secrets.VBR_USERNAME }}
        VBR_PASSWORD: ${{ secrets.VBR_PASSWORD }}
      run: |
        $exePath = "${{ github.workspace }}\test-run\VeeamHealthCheck.exe"
        
        Write-Host "Starting VeeamHealthCheck..." -ForegroundColor Cyan
        Write-Host "Target VBR: $env:VBR_HOST" -ForegroundColor Yellow
        Write-Host "Working directory: $(Split-Path $exePath)" -ForegroundColor Yellow
        
        
        # Run from the extracted directory so it can find relative paths
        Push-Location (Split-Path $exePath)
        try {
          $process = Start-Process -FilePath $exePath `
            -ArgumentList "/run" `
            -NoNewWindow -PassThru -Wait
          
          $exitCode = $process.ExitCode
          
          if ($exitCode -eq 0) {
            Write-Host "Health check completed successfully!" -ForegroundColor Green
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Health check failed with exit code: $exitCode" -ForegroundColor Red
            echo "success=false" >> $env:GITHUB_OUTPUT
            exit $exitCode
          }
        } finally {
          Pop-Location
        }
    
    - name: Scan VHC logs for errors
      # P2-1: extract to composite action
      if: always()
      run: |
        $logDir = "C:\temp\vHC\Original\Log"
        $logFiles = Get-ChildItem "$logDir\*.log" -ErrorAction SilentlyContinue

        if (-not $logFiles) {
          Write-Host "⚠️ No log files found in $logDir" -ForegroundColor Yellow
          exit 0
        }

        Write-Host "📋 Scanning $($logFiles.Count) log file(s) for errors..." -ForegroundColor Cyan

        $errorPatterns = @('ERROR', 'EXCEPTION', 'FATAL')
        $findings = @()

        foreach ($log in $logFiles) {
          $lineNum = 0
          foreach ($line in (Get-Content $log.FullName)) {
            $lineNum++
            foreach ($pattern in $errorPatterns) {
              if ($line -match $pattern) {
                $findings += [PSCustomObject]@{
                  File    = $log.Name
                  Line    = $lineNum
                  Pattern = $pattern
                  Text    = $line.Trim().Substring(0, [Math]::Min($line.Trim().Length, 200))
                }
                break  # one match per line is enough
              }
            }
          }
        }

        if ($findings.Count -eq 0) {
          Write-Host "✅ No ERROR/EXCEPTION/FATAL entries found in logs" -ForegroundColor Green
        } else {
          Write-Host "❌ Found $($findings.Count) error entries in VHC logs:" -ForegroundColor Red
          $findings | ForEach-Object {
            Write-Host "  [$($_.Pattern)] $($_.File):$($_.Line) — $($_.Text)" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "VHC exited 0 but logged errors — this indicates partial data collection failure." -ForegroundColor Red
          exit 1
        }

    - name: Find generated report
      id: find_report
      if: always()
      run: |
        $reportDir = "C:\temp\vHC\vHC-Report"
        if (Test-Path $reportDir) {
          $latestReport = Get-ChildItem -Path $reportDir -Filter "*.html" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 1
          
          if ($latestReport) {
            echo "report_path=$($latestReport.FullName)" >> $env:GITHUB_OUTPUT
            echo "report_name=$($latestReport.Name)" >> $env:GITHUB_OUTPUT
          }
        }
    
    - name: Upload health check report
      if: always() && steps.find_report.outputs.report_path
      uses: actions/upload-artifact@v4
      with:
        name: health-check-report-${{ github.run_number }}-v12
        path: ${{ steps.find_report.outputs.report_path }}
        retention-days: 30

    - name: Validate session report generation
      if: always()
      run: |
        # Session reporting now runs inside Get-VBRConfig.ps1 via Get-VhcBackupSessions /
        # Get-VhcSessionReport module functions. SessionCache.xml no longer exists.
        $logDir = "C:\temp\vHC\Original\Log"
        $logFile = Get-ChildItem $logDir -Filter "*.log" -ErrorAction SilentlyContinue |
                   Where-Object Name -notmatch "VeeamSessionReport" |
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($logFile) {
          $logContent = Get-Content $logFile.FullName -Raw -ErrorAction SilentlyContinue
          if ($logContent -match "Fetched (\d+) backup sessions") {
            Write-Host "✅ Backup sessions fetched: $($Matches[1])" -ForegroundColor Green
          }
          if ($logContent -match "Exported (\d+) session rows") {
            Write-Host "✅ Session report exported: $($Matches[1]) rows" -ForegroundColor Green
          } elseif ($logContent -match "No session rows produced") {
            Write-Host "⚠️ Session report produced no rows" -ForegroundColor Yellow
          }
        } else {
          Write-Host "⚠️ Collection log not found at $logDir" -ForegroundColor Yellow
        }

    - name: Validate CSV collection outputs
      id: csv_validation
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "📁 CSV Directory: $($csvDir.FullName)" -ForegroundColor Cyan

          # CRITICAL files - job FAILS if any are missing (indicates PS script failure)
          # Files are prefixed with hostname: e.g., localhost_Jobs.csv, servername_Servers.csv
          $criticalPatterns = @('*_Servers.csv', '*_Proxies.csv', '*_Repositories.csv', '*_Jobs.csv', '*_vbrinfo.csv')

          # Optional files - warning only
          $optionalPatterns = @('*_UserRoles.csv', '*_SOBRs.csv', '*_LicInfo.csv', 'VeeamSessionReport.csv')

          $foundCount = 0
          $criticalMissing = @()
          $optionalMissing = @()

          foreach ($pattern in $criticalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [CRITICAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ❌ [CRITICAL] $pattern - MISSING" -ForegroundColor Red
              $criticalMissing += $pattern
            }
          }

          foreach ($pattern in $optionalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ✅ [OPTIONAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ⚠️ [OPTIONAL] $pattern - missing" -ForegroundColor Yellow
              $optionalMissing += $pattern
            }
          }

          Write-Host ""
          Write-Host "📊 CSV Summary: $foundCount found" -ForegroundColor Cyan

          if ($criticalMissing.Count -gt 0) {
            Write-Host "❌ CRITICAL FILES MISSING: $($criticalMissing -join ', ')" -ForegroundColor Red
            Write-Host "This indicates the PowerShell collection script failed." -ForegroundColor Red
            Write-Host "Check the logs above for 'PowerShell Errors' or 'Script failed with exit code'" -ForegroundColor Yellow
            exit 1
          }
        } else {
          Write-Host "❌ CSV output directory not found - collection likely failed completely" -ForegroundColor Red
          exit 1
        }

    - name: Validate CSV content quality
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if ($csvDir) {
          Write-Host "🔍 Validating CSV Content Quality..." -ForegroundColor Cyan

          # Validate _vbrinfo.csv version format
          $vbrinfoPath = Join-Path $csvDir.FullName "_vbrinfo.csv"
          if (Test-Path $vbrinfoPath) {
            $vbrinfo = Import-Csv $vbrinfoPath
            if ($vbrinfo.Version -match '^\d{1,2}\.\d{1,2}\.\d{1,2}\.\d{3,4}$') {
              Write-Host "  ✅ VBR version format valid: $($vbrinfo.Version)" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ VBR version format unexpected: $($vbrinfo.Version)" -ForegroundColor Yellow
            }
          }

          # Validate Repositories.csv data integrity
          $reposPath = Join-Path $csvDir.FullName "_Repositories.csv"
          if (Test-Path $reposPath) {
            $repos = Import-Csv $reposPath
            $invalidRepos = $repos | Where-Object {
              [long]$_.FreeSpace -gt [long]$_.TotalSpace
            }
            if ($invalidRepos.Count -eq 0) {
              Write-Host "  ✅ All repositories have valid FreeSpace <= TotalSpace" -ForegroundColor Green
            } else {
              Write-Host "  ❌ Found $($invalidRepos.Count) repositories with FreeSpace > TotalSpace" -ForegroundColor Red
              $invalidRepos | ForEach-Object { Write-Host "    - $($_.Name): Free=$($_.FreeSpace) > Total=$($_.TotalSpace)" }
              exit 1
            }
          }

          # Validate Proxies reference valid Servers
          $serversPath = Join-Path $csvDir.FullName "_Servers.csv"
          $proxiesPath = Join-Path $csvDir.FullName "_Proxies.csv"
          if ((Test-Path $serversPath) -and (Test-Path $proxiesPath)) {
            $servers = Import-Csv $serversPath
            $proxies = Import-Csv $proxiesPath
            $serverNames = $servers.Name

            $orphanProxies = $proxies | Where-Object {
              $serverNames -notcontains $_.Host
            }

            if ($orphanProxies.Count -eq 0) {
              Write-Host "  ✅ All proxy hosts have corresponding server entries" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️ Found $($orphanProxies.Count) proxies with missing server entries" -ForegroundColor Yellow
              $orphanProxies | ForEach-Object { Write-Host "    - Proxy '$($_.Name)' references unknown host '$($_.Host)'" }
            }
          }

          Write-Host "✅ CSV content validation complete" -ForegroundColor Green
        }

    - name: Validate CSV column schemas
      # P2-1: extract to composite action
      if: always()
      run: |
        $csvDir = Get-ChildItem "C:\temp\vHC\Original\VBR\*\*" -Directory -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending | Select-Object -First 1

        if (-not $csvDir) {
          Write-Host "⚠️ CSV directory not found, skipping schema validation" -ForegroundColor Yellow
          exit 0
        }

        $expectedSchemas = @{
          '*_vbrinfo.csv'       = @('Name', 'Version', 'SqlServer')
          '*_Servers.csv'       = @('Name', 'Type')
          '*_Proxies.csv'       = @('Name', 'Host')
          '*_Repositories.csv'  = @('Name', 'Path')
          '*_Jobs.csv'          = @('Name', 'Type')
        }

        $failures = @()

        foreach ($pattern in $expectedSchemas.Keys) {
          $file = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue |
                  Select-Object -First 1

          if (-not $file) {
            Write-Host "  ⚠️ $pattern not found — skipping schema check (existence validated elsewhere)" -ForegroundColor Yellow
            continue
          }

          # Read just the header row
          $headerLine = Get-Content $file.FullName -TotalCount 1
          if (-not $headerLine) {
            Write-Host "  ❌ $($file.Name) is empty — no header row" -ForegroundColor Red
            $failures += $file.Name
            continue
          }

          $actualColumns = ($headerLine -split ',') | ForEach-Object { $_.Trim('"', ' ') }
          $expectedColumns = $expectedSchemas[$pattern]
          $missingColumns = @()

          foreach ($col in $expectedColumns) {
            if ($actualColumns -notcontains $col) {
              $missingColumns += $col
            }
          }

          if ($missingColumns.Count -eq 0) {
            Write-Host "  ✅ $($file.Name) — all expected columns present: $($expectedColumns -join ', ')" -ForegroundColor Green
          } else {
            Write-Host "  ❌ $($file.Name) — missing columns: $($missingColumns -join ', ')" -ForegroundColor Red
            Write-Host "       Expected: $($expectedColumns -join ', ')" -ForegroundColor Yellow
            Write-Host "       Actual:   $($actualColumns -join ', ')" -ForegroundColor Yellow
            $failures += "$($file.Name) (missing: $($missingColumns -join ', '))"
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ CSV schema validation failed for $($failures.Count) file(s):" -ForegroundColor Red
          $failures | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
          Write-Host "Column renames in PS scripts break the C# CSV parser silently." -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ CSV column schema validation complete" -ForegroundColor Green

    - name: Validate HTML report content
      if: always()
      run: |
        $reportPath = "${{ steps.find_report.outputs.report_path }}"

        if ($reportPath -and (Test-Path $reportPath)) {
          Write-Host "🔍 Validating HTML Report Content..." -ForegroundColor Cyan

          $reportContent = Get-Content $reportPath -Raw

          # Core required sections (fail if missing)
          $coreRequiredSections = @(
            'License Information',
            'Backup Server'
          )

          # Optional sections (warn if missing, but don't fail)
          $optionalSections = @(
            'Security Summary',
            'Proxy Configuration',
            'Repository Configuration',
            'Job Summary'
          )

          # Check core required sections
          $missingCore = @()
          foreach ($section in $coreRequiredSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingCore += $section
            }
          }

          if ($missingCore.Count -eq 0) {
            Write-Host "  ✅ All core sections present" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Missing core required sections:" -ForegroundColor Red
            $missingCore | ForEach-Object { Write-Host "    - $_" }
            exit 1
          }

          # Check optional sections (informational only)
          $missingOptional = @()
          foreach ($section in $optionalSections) {
            if ($reportContent -notmatch [regex]::Escape($section)) {
              $missingOptional += $section
            }
          }

          if ($missingOptional.Count -gt 0) {
            Write-Host "  ⚠️ Optional sections not found (may not be configured):" -ForegroundColor Yellow
            $missingOptional | ForEach-Object { Write-Host "    - $_" }
          } else {
            Write-Host "  ✅ All optional sections present" -ForegroundColor Green
          }

          # Validate navigation links
          $hrefMatches = [regex]::Matches($reportContent, 'href=[''"]#(\w+)[''"]')
          $idMatches = [regex]::Matches($reportContent, 'id=[''"](\w+)[''"]')

          $hrefs = $hrefMatches | ForEach-Object { $_.Groups[1].Value }
          $ids = $idMatches | ForEach-Object { $_.Groups[1].Value }

          $deadLinks = $hrefs | Where-Object { $ids -notcontains $_ }

          if ($deadLinks.Count -eq 0) {
            Write-Host "  ✅ All navigation links are valid" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($deadLinks.Count) dead navigation links" -ForegroundColor Red
            $deadLinks | ForEach-Object { Write-Host "    - #$_" }
            Write-Host "Report navigation is broken — this is a release-blocking defect." -ForegroundColor Red
            exit 1
          }

          # Validate percentages are in valid range
          $percentageMatches = [regex]::Matches($reportContent, '(\d+\.?\d*)\s*%')
          $invalidPercentages = @()

          foreach ($match in $percentageMatches) {
            $value = [decimal]$match.Groups[1].Value
            if ($value -lt 0 -or $value -gt 100) {
              $invalidPercentages += $value
            }
          }

          if ($invalidPercentages.Count -eq 0) {
            Write-Host "  ✅ All percentages are within valid range (0-100%)" -ForegroundColor Green
          } else {
            Write-Host "  ❌ Found $($invalidPercentages.Count) percentages out of range" -ForegroundColor Red
            $invalidPercentages | ForEach-Object { Write-Host "    - $_%" }
            exit 1
          }

          Write-Host "✅ HTML report content validation complete" -ForegroundColor Green
        } else {
          Write-Host "⚠️ Report file not found, skipping HTML validation" -ForegroundColor Yellow
        }

    - name: Validate HTML table data rows
      # P2-1: extract to composite action
      if: always()
      run: |
        $reportFile = "${{ steps.find_report.outputs.report_path }}"
        if (-not $reportFile -or -not (Test-Path $reportFile)) {
          Write-Host "⚠️ Report file not found, skipping table validation" -ForegroundColor Yellow
          exit 0
        }

        $content = Get-Content $reportFile -Raw

        # Tables that MUST have at least one data row (1 <tr> header + 1+ <tr> data)
        # Key: regex to locate the table section; Value: human-readable name
        $requiredTables = @{
          'License Information'  = 'License Information'
          'Backup Server'        = 'Backup Server'
        }

        # Tables that SHOULD have data rows (warn only)
        $warnTables = @{
          'Proxy Configuration'     = 'Proxy Configuration'
          'Repository Configuration' = 'Repository Configuration'
          'Job Summary'              = 'Job Summary'
        }

        $failures = @()
        $warnings = @()

        function Test-TableHasDataRows {
          param([string]$Content, [string]$SectionName)
          # Find the section, then the next <table>...</table> block
          $sectionIdx = $Content.IndexOf($SectionName)
          if ($sectionIdx -lt 0) { return $null }  # section not found

          $tableStart = $Content.IndexOf('<table', $sectionIdx)
          if ($tableStart -lt 0) { return $null }

          $tableEnd = $Content.IndexOf('</table>', $tableStart)
          if ($tableEnd -lt 0) { return $null }

          $tableHtml = $Content.Substring($tableStart, $tableEnd - $tableStart + 8)
          $rowCount = ([regex]::Matches($tableHtml, '<tr[\s>]')).Count

          return $rowCount  # 1 = header only, 2+ = has data
        }

        foreach ($key in $requiredTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($requiredTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ❌ [$($requiredTables[$key])] Table has $rows row(s) — no data rows" -ForegroundColor Red
            $failures += $requiredTables[$key]
          } else {
            Write-Host "  ✅ [$($requiredTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        foreach ($key in $warnTables.Keys) {
          $rows = Test-TableHasDataRows -Content $content -SectionName $key
          if ($null -eq $rows) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Section/table not found" -ForegroundColor Yellow
          } elseif ($rows -le 1) {
            Write-Host "  ⚠️ [$($warnTables[$key])] Table has $rows row(s) — empty" -ForegroundColor Yellow
            $warnings += $warnTables[$key]
          } else {
            Write-Host "  ✅ [$($warnTables[$key])] Table has $($rows - 1) data row(s)" -ForegroundColor Green
          }
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "❌ $($failures.Count) required table(s) have no data: $($failures -join ', ')" -ForegroundColor Red
          exit 1
        }

        Write-Host "✅ HTML table row validation complete" -ForegroundColor Green

    - name: Collect performance metrics
      if: always()
      run: |
        $logFiles = Get-ChildItem "C:\temp\vHC\Original\Log\*.log" -ErrorAction SilentlyContinue

        Write-Host "⏱️ Performance Metrics:" -ForegroundColor Cyan
        foreach ($log in $logFiles) {
          $content = Get-Content $log.FullName
          $startLine = $content | Where-Object { $_ -match "Starting|Enter" } | Select-Object -First 1
          $endLine = $content | Where-Object { $_ -match "complete|DONE" } | Select-Object -Last 1

          if ($startLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $startTs = $Matches[1]
            if ($endLine -match "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})") {
            $endTs = $Matches[1]
            try {
              $start = [datetime]::ParseExact($startTs, "yyyy-MM-dd HH:mm:ss", $null)
              $end = [datetime]::ParseExact($endTs, "yyyy-MM-dd HH:mm:ss", $null)
              $duration = ($end - $start).TotalMinutes
              Write-Host "  📄 $($log.BaseName): $([math]::Round($duration, 2)) minutes" -ForegroundColor White
            } catch {
              Write-Host "  ⚠️ $($log.BaseName): Could not parse timing" -ForegroundColor Yellow
            }
            }
          }
        }

    - name: Upload health check logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: health-check-logs-${{ github.run_number }}-v12
        path: C:\temp\vHC\Original\Log\*.log
        if-no-files-found: warn
        retention-days: 7

    - name: Cleanup
      if: always()
      continue-on-error: true
      run: |
        # Add delay to allow file handles to release
        Start-Sleep -Seconds 2
        if (Test-Path "${{ github.workspace }}\test-run") {
          Remove-Item -Path "${{ github.workspace }}\test-run" -Recurse -Force -ErrorAction SilentlyContinue
        }
        if (Test-Path "${{ github.workspace }}\test-download") {
          Remove-Item -Path "${{ github.workspace }}\test-download" -Recurse -Force -ErrorAction SilentlyContinue
        }
        # if (Test-Path "C:\temp\vHC") {
        #   Remove-Item -Path "C:\temp\vHC" -Recurse -Force
        # }

  # VirusTotal scan - only on master branch
  virustotal-scan:
    needs: [integration-test-vbr, integration-test-vbr-13-sql, integration-test-vbr-12]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/master'
    outputs:
      zip_clean: ${{ steps.evaluate_zip.outputs.clean }}
    
    steps:
    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: publish

    - name: Compute file hashes and size
      id: hash
      run: |
        $zipPath = Get-ChildItem "publish/*.zip" | Select-Object -First 1
        $zipHash = (Get-FileHash $zipPath -Algorithm SHA256).Hash
        $zipSizeMB = [math]::Round($zipPath.Length / 1MB, 2)
        
        echo "zip_sha256=$zipHash" >> $env:GITHUB_OUTPUT
        echo "zip_path=$($zipPath.FullName)" >> $env:GITHUB_OUTPUT
        echo "zip_size_mb=$zipSizeMB" >> $env:GITHUB_OUTPUT
        
        echo "ZIP SHA256: $zipHash"
        echo "ZIP Size: $zipSizeMB MB"

    - name: Submit ZIP to VirusTotal
      id: submit_zip
      continue-on-error: true
      run: |
        $api = "${{ secrets.VIRUSTOTAL_API_KEY }}"
        if ([string]::IsNullOrEmpty($api)) {
          echo "⚠️ VIRUSTOTAL_API_KEY not set - skipping scan"
          echo "scan_id=skip" >> $env:GITHUB_OUTPUT
          echo "reason=no_api_key" >> $env:GITHUB_OUTPUT
          exit 0
        }
        
        $filePath = "${{ steps.hash.outputs.zip_path }}"
        $sizeMB = [decimal]"${{ steps.hash.outputs.zip_size_mb }}"
        $headers = @{ 'x-apikey' = $api }
        
        try {
          # For files larger than 32MB, use the upload URL endpoint
          if ($sizeMB -gt 32) {
            echo "📤 Large file detected ($sizeMB MB) - requesting upload URL..."
            
            # Get upload URL for large files
            $urlResp = Invoke-RestMethod -Method Get -Uri 'https://www.virustotal.com/api/v3/files/upload_url' -Headers $headers
            $uploadUrl = $urlResp.data
            
            echo "✅ Upload URL received"
            echo "Uploading $sizeMB MB ZIP to VirusTotal (this may take a few minutes)..."
            
            # Use curl for reliable large file uploads
            $curlOutput = & curl.exe -X POST "$uploadUrl" `
              -H "x-apikey: $api" `
              -F "file=@$filePath" `
              --silent --show-error
            
            if ($LASTEXITCODE -ne 0) {
              throw "Curl upload failed with exit code $LASTEXITCODE"
            }
            
            $resp = $curlOutput | ConvertFrom-Json
            $scanId = $resp.data.id

            
            if ([string]::IsNullOrEmpty($scanId)) {
              echo "Response: $curlOutput"
              throw "Failed to get scan ID from response"
            }
            
            echo "scan_id=$scanId" >> $env:GITHUB_OUTPUT
            echo "✅ Large file submitted: $scanId"
          } else {
            # For files under 32MB, use standard endpoint
            echo "Submitting $sizeMB MB ZIP to VirusTotal..."
            $form = @{ file = Get-Item $filePath }
            $resp = Invoke-RestMethod -Method Post -Uri 'https://www.virustotal.com/api/v3/files' -Headers $headers -Form $form
            $scanId = $resp.data.id
            echo "scan_id=$scanId" >> $env:GITHUB_OUTPUT
            echo "✅ ZIP submitted: $scanId"
          }
        } catch {
          $errorMsg = $_.Exception.Message
          if ($errorMsg -match "413|too large|Entity Too Large") {
            echo "⚠️ File too large for VirusTotal API - this shouldn't happen with upload URL"
            echo "scan_id=skip" >> $env:GITHUB_OUTPUT
            echo "reason=file_too_large" >> $env:GITHUB_OUTPUT
            exit 0
          } else {
            echo "❌ Failed to submit ZIP: $errorMsg"
            echo "scan_id=error" >> $env:GITHUB_OUTPUT
            exit 1
          }
        }

    - name: Poll ZIP scan result
      id: poll_zip
      if: steps.submit_zip.outputs.scan_id != 'skip' && steps.submit_zip.outputs.scan_id != 'error'
      run: |
        $api = "${{ secrets.VIRUSTOTAL_API_KEY }}"
        $scanId = "${{ steps.submit_zip.outputs.scan_id }}"
        $headers = @{ 'x-apikey' = $api }
        
        # Generate the permalink to the scan results
        $permalink = "https://www.virustotal.com/gui/file-analysis/$scanId"
        echo "scan_url=$permalink" >> $env:GITHUB_OUTPUT
        echo "📊 Scan URL: $permalink"
        
        echo "Waiting for ZIP scan to complete..."
        for ($i = 0; $i -lt 30; $i++) {
          Start-Sleep -Seconds 20
          
          try {
            $resp = Invoke-RestMethod -Method Get -Uri "https://www.virustotal.com/api/v3/analyses/$scanId" -Headers $headers
            $status = $resp.data.attributes.status
            
            if ($status -eq 'completed') {
              $stats = $resp.data.attributes.stats
              $malicious = $stats.malicious
              $suspicious = $stats.suspicious
              $undetected = $stats.undetected
              
              echo "malicious=$malicious" >> $env:GITHUB_OUTPUT
              echo "suspicious=$suspicious" >> $env:GITHUB_OUTPUT
              echo "✅ ZIP scan complete: $malicious malicious, $suspicious suspicious, $undetected clean"
              echo "📊 View full report: $permalink"
              exit 0
            }
            
            echo "Status: $status (attempt $($i+1)/30)"
          } catch {
            echo "Error polling: $_"
          }
        }
        
        echo "❌ Timeout waiting for ZIP scan"
        exit 1

    - name: Evaluate ZIP scan result
      id: evaluate_zip
      # Threshold strategy:
      # - 0 detections: ✅ Clean
      # - 1-2 detections: ⚠️ Warning (likely false positive from obscure AVs like Zillya)
      # - 3+ detections: ❌ Fail (likely real issue)
      # Major vendors (MS Defender, Kaspersky, Sophos, etc.) must be clean
      run: |
        $scanId = "${{ steps.submit_zip.outputs.scan_id }}"
        $reason = "${{ steps.submit_zip.outputs.reason }}"
        $scanUrl = "${{ steps.poll_zip.outputs.scan_url }}"
        
        if ($scanId -eq 'skip') {
          if ($reason -eq 'file_too_large') {
            echo "clean=false" >> $env:GITHUB_OUTPUT
            echo "❌ ZIP scan skipped (file too large for VirusTotal API) - blocking release in strict mode"
            echo "::error title=VirusTotal Scan Required::File too large to scan. Manual review required."
            exit 1
          } elseif ($reason -eq 'no_api_key') {
            echo "clean=false" >> $env:GITHUB_OUTPUT
            echo "❌ ZIP scan skipped (no API key) - blocking release in strict mode"
            echo "::error title=VirusTotal API Key Required::Configure VIRUSTOTAL_API_KEY secret for releases."
            exit 1
          } else {
            echo "clean=false" >> $env:GITHUB_OUTPUT
            echo "❌ ZIP scan skipped - blocking release in strict mode"
            exit 1
          }
        }
        
        if ($scanId -eq 'error') {
          echo "clean=error" >> $env:GITHUB_OUTPUT
          echo "❌ ZIP scan failed"
          exit 1
        }
        
        $malicious = [int]"${{ steps.poll_zip.outputs.malicious }}"
        $suspicious = [int]"${{ steps.poll_zip.outputs.suspicious }}"
        $totalFlags = $malicious + $suspicious

        # Major vendors that MUST be clean — any detection from these is a hard fail
        $majorVendors = @(
          'Microsoft', 'Kaspersky', 'Sophos', 'ESET-NOD32', 'Symantec',
          'BitDefender', 'McAfee', 'CrowdStrike', 'Avast', 'AVG',
          'TrendMicro', 'Fortinet', 'Panda', 'DrWeb', 'Malwarebytes'
        )

        if ($totalFlags -eq 0) {
          # Tier 0: Clean
          echo "clean=true" >> $env:GITHUB_OUTPUT
          echo "✅ ZIP scan passed (0 detections)"
          if (![string]::IsNullOrEmpty($scanUrl)) {
            echo "📊 Scan report: $scanUrl"
          }
        } elseif ($totalFlags -le 2) {
          # Tier 1-2: Likely false positive — verify no major vendor flagged it
          $api = "${{ secrets.VIRUSTOTAL_API_KEY }}"
          $headers = @{ 'x-apikey' = $api }
          $resp = Invoke-RestMethod -Method Get -Uri "https://www.virustotal.com/api/v3/analyses/$scanId" -Headers $headers
          $results = $resp.data.attributes.results

          $majorHits = $majorVendors | Where-Object {
            $results.$_.category -in @('malicious', 'suspicious')
          }

          if ($majorHits.Count -gt 0) {
            echo "clean=false" >> $env:GITHUB_OUTPUT
            echo "needs_review=true" >> $env:GITHUB_OUTPUT
            echo "❌ Major vendor detection(s): $($majorHits -join ', ')"
            echo "📊 Review scan results: $scanUrl"
            echo "::error title=VirusTotal Major Vendor Detection::Flagged by major vendor(s): $($majorHits -join ', '). Manual review required: $scanUrl"
            exit 1
          }

          # Minor vendor only — warn but pass
          echo "clean=true" >> $env:GITHUB_OUTPUT
          echo "⚠️ ZIP passed with $totalFlags minor detection(s) — no major vendors flagged"
          echo "📊 Scan report: $scanUrl"
          echo "::warning title=VirusTotal Minor Detection::$totalFlags engine(s) flagged (minor vendors only). Review: $scanUrl"
        } else {
          # Tier 3+: Likely real issue — hard fail
          echo "clean=false" >> $env:GITHUB_OUTPUT
          echo "needs_review=true" >> $env:GITHUB_OUTPUT
          echo "❌ VirusTotal flagged ZIP ($malicious malicious, $suspicious suspicious)"
          echo "📊 Review scan results: $scanUrl"
          echo "::error title=VirusTotal Detection::ZIP flagged by $totalFlags engine(s). Manual review required: $scanUrl"
          exit 1
        }
    
    - name: Get detailed detection info
      if: failure() && steps.evaluate_zip.outputs.needs_review == 'true'
      run: |
        $api = "${{ secrets.VIRUSTOTAL_API_KEY }}"
        $scanId = "${{ steps.submit_zip.outputs.scan_id }}"
        $headers = @{ 'x-apikey' = $api }
        
        try {
          $resp = Invoke-RestMethod -Method Get -Uri "https://www.virustotal.com/api/v3/analyses/$scanId" -Headers $headers
          $results = $resp.data.attributes.results
          
          echo "### 🔍 Detection Details ###"
          $results.PSObject.Properties | Where-Object { 
            $_.Value.category -eq 'malicious' -or $_.Value.category -eq 'suspicious' 
          } | ForEach-Object {
            $engine = $_.Name
            $category = $_.Value.category
            $result = $_.Value.result
            $method = $_.Value.method
            echo "  - $engine : $category - $result (method: $method)"
          }
        } catch {
          echo "Could not retrieve detailed detection info: $_"
        }

  # Create GitHub release - only on master after scans pass
  create-release:
    needs: [build-and-test, virustotal-scan]
    runs-on: windows-latest
    # Strict security gate: only create release with zero VirusTotal detections
    if: |
      github.ref == 'refs/heads/master' &&
      needs.virustotal-scan.outputs.zip_clean == 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for release notes generation

    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: veeam-healthcheck-zip
        path: release-files
    
    - name: Compute release hash
      id: release_hash
      run: |
        $zipPath = Get-ChildItem "release-files/*.zip" | Select-Object -First 1
        $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash
        $sizeMB = [math]::Round($zipPath.Length / 1MB, 2)
        echo "hash=$hash" >> $env:GITHUB_OUTPUT
        echo "size_mb=$sizeMB" >> $env:GITHUB_OUTPUT

    - name: Generate Release Notes
      id: release_notes
      run: |
        # Fetch the last release tag to compare changes
        $lastTag = git describe --tags --abbrev=0 2>$null
        if (-not $lastTag) {
          $lastTag = (git rev-list --max-parents=0 HEAD)
        }

        # Get commit messages since last release
        $commits = git log "$lastTag..HEAD" --pretty=format:"- %s (%h)" --no-merges

        # Find merged PRs by searching commit messages
        $prNumbers = git log "$lastTag..HEAD" --pretty=format:"%s" |
          Select-String -Pattern "#(\d+)" -AllMatches |
          ForEach-Object { $_.Matches } |
          ForEach-Object { $_.Groups[1].Value } |
          Sort-Object -Unique

        # Extract issues fixed (Fixes #XX, Closes #XX, Resolves #XX)
        $fixedIssues = git log "$lastTag..HEAD" --pretty=format:"%B" |
          Select-String -Pattern "(?:Fixes|Closes|Resolves)\s+#(\d+)" -AllMatches |
          ForEach-Object { $_.Matches } |
          ForEach-Object { $_.Groups[1].Value } |
          Sort-Object -Unique

        # Get list of changed files
        $changedFiles = git diff --name-only "$lastTag..HEAD" | Measure-Object | Select-Object -ExpandProperty Count

        # Build changelog section
        $changelog = ""
        if ($commits) {
          $changelog = @"
        ### 📝 Changes in This Release

        $commits

        **Files Changed:** $changedFiles
        "@
        }

        # Build issues section
        $issuesSection = ""
        if ($fixedIssues) {
          $issuesList = $fixedIssues | ForEach-Object { "- Fixes #$_ - https://github.com/${{ github.repository }}/issues/$_" }
          $issuesSection = @"

        ### 🐛 Issues Resolved

        $($issuesList -join "`n")
        "@
        }

        # Build PR section
        $prSection = ""
        if ($prNumbers) {
          $prList = $prNumbers | ForEach-Object { "- PR #$_ - https://github.com/${{ github.repository }}/pull/$_" }
          $prSection = @"

        ### 🔀 Pull Requests

        $($prList -join "`n")
        "@
        }

        # Combine all sections
        $releaseNotes = @"
        $changelog$issuesSection$prSection
        "@

        # Output multiline content using heredoc syntax (no URL encoding needed)
        echo "changelog<<EOF" >> $env:GITHUB_OUTPUT
        echo $releaseNotes >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.build-and-test.outputs.version }}
        name: Veeam Health Check v${{ needs.build-and-test.outputs.version }}
        body: |
          ## Veeam Health Check v${{ needs.build-and-test.outputs.version }}

          ${{ steps.release_notes.outputs.changelog }}

          ### ✅ Security & Quality Verification
          - ✅ Build & Unit Tests: **Passed**
          - ✅ VirusTotal Scan: **Clean** (0 detections)
          - ✅ Integration Tests: **Passed** (VBR v12, v13, v13+SQL)
          - ✅ Code Quality: Analyzed

          ### 📦 Download
          **VeeamHealthCheck-${{ needs.build-and-test.outputs.version }}.zip** (${{ steps.release_hash.outputs.size_mb }} MB)

          **SHA256 Checksum:**
          ```
          ${{ steps.release_hash.outputs.hash }}
          ```

          **Verification Command:**
          ```powershell
          (Get-FileHash "VeeamHealthCheck-${{ needs.build-and-test.outputs.version }}.zip").Hash
          ```

          ### 📋 Requirements
          - Windows 7 or later
          - .NET 8 runtime (included in self-contained build)
          - PowerShell 5.1 or later

          ### 🚀 Quick Start
          1. Download the ZIP file above
          2. Extract to a folder
          3. Run `VeeamHealthCheck.exe`

          ---

          **Built from:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Build Date:** ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false
        files: release-files/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release created successfully
      run: |
        echo "🎉 Release v${{ needs.build-and-test.outputs.version }} created successfully!"
        echo "URL: ${{ steps.create_release.outputs.url }}"
