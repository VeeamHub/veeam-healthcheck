              $foundCount++
            } else {
              Write-Host "  ‚ùå [CRITICAL] $pattern - MISSING" -ForegroundColor Red
              $criticalMissing += $pattern
            }
          }

          foreach ($pattern in $optionalPatterns) {
            $found = Get-ChildItem -Path $csvDir.FullName -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $size = $found.Length
              $rowCount = (Import-Csv $found.FullName -ErrorAction SilentlyContinue).Count
              Write-Host "  ‚úÖ [OPTIONAL] $($found.Name) - $size bytes, $rowCount rows" -ForegroundColor Green
              $foundCount++
            } else {
              Write-Host "  ‚ö†Ô∏è [OPTIONAL] $pattern - missing" -ForegroundColor Yellow
              $optionalMissing += $pattern
            }
          }

          Write-Host ""
          Write-Host "üìä CSV Summary: $foundCount found" -ForegroundColor Cyan

